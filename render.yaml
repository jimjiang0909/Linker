databases:
  - name: linker-db
    plan: free
    databaseName: linker_db
    user: linker

services:
  - type: web
    name: linker-api
    runtime: node
    plan: free
    rootDir: backend
    buildCommand: npm install && npx prisma generate && npx prisma migrate deploy
    startCommand: node src/app.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: linker-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: CF_AIG_BASE_URL
        value: https://gateway.ai.cloudflare.com/v1/4140c0dc09d603923bdce539c8c83714/jim/openai
      - key: CF_AIG_TOKEN
        sync: false
