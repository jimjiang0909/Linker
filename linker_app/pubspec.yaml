name: linker_app
description: "Linker - AI 社交介绍应用 Flutter 客户端"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.9

dependencies:
  flutter:
    sdk: flutter

  # UI
  cupertino_icons: ^1.0.8
  cached_network_image: ^3.4.1

  # 状态管理
  flutter_riverpod: ^3.3.1

  # 网络
  dio: ^5.9.2
  socket_io_client: ^3.1.4
  connectivity_plus: ^7.1.1

  # 路由
  go_router: ^17.2.3

  # 存储
  flutter_secure_storage: ^10.2.0
  shared_preferences: ^2.5.5

  # 媒体
  image_picker: ^1.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter

  # 代码规范
  flutter_lints: ^6.0.0

  # 测试
  mockito: ^5.6.4
  glados: ^1.1.7

  # 代码生成
  build_runner: ^2.15.0

flutter:
  uses-material-design: true
